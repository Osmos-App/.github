<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="380" viewBox="0 0 1200 380" role="img" aria-labelledby="title desc">
  <title id="title">Osmos — local-first version control for creative work</title>
  <desc id="desc">A project folder evolves from many manually named versions into one file with a local history. Osmos keeps the versioning close to the work.</desc>
  <rect width="1200" height="380" rx="26" fill="#f4f5f3"/>
  <rect x="1" y="1" width="1198" height="378" rx="25" fill="none" stroke="#cbd3d0"/>
  <path d="M48 66H1152M48 310H1152" stroke="#c6cfcc"/>
  <g id="title-block" transform="translate(58 42)">
    <text fill="#50736d" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" letter-spacing="2">OSMOS / LOCAL-FIRST VERSION CONTROL</text>
    <text y="70" fill="#1b1d1c" font-family="Georgia, serif" font-size="66" font-weight="600">Keep making. Keep history.</text>
    <text y="111" fill="#4d5d59" font-family="Georgia, serif" font-size="22">Version control that stays close to the files you create.</text>
  </g>
  <g id="project-proof" transform="translate(58 210)">
    <text x="0" y="-15" fill="#6b7975" font-family="ui-monospace, monospace" font-size="12" letter-spacing="1.5">THE WORKING FOLDER, WITHOUT THE VERSION-NAME CHAOS</text>
    <rect width="248" height="68" rx="10" fill="#fafaf9" stroke="#c4d0cc"/>
    <text x="18" y="26" fill="#7b8985" font-family="ui-monospace, monospace" font-size="12">BEFORE</text>
    <text x="18" y="49" fill="#33413d" font-family="ui-monospace, monospace" font-size="15">logo_final_v27.psd</text>
    <path d="M271 34H340" stroke="#0d6f66" stroke-width="2"/><path d="M332 27l10 7-10 7" fill="none" stroke="#0d6f66" stroke-width="2"/>
    <rect x="364" width="292" height="68" rx="10" fill="#e4f1ed" stroke="#8fbbb1"/>
    <text x="382" y="26" fill="#0d6f66" font-family="ui-monospace, monospace" font-size="12">OSMOS</text>
    <text x="382" y="49" fill="#263b36" font-family="ui-monospace, monospace" font-size="15">logo.psd  ·  local history</text>
    <path d="M685 34H754" stroke="#0d6f66" stroke-width="2"/><path d="M746 27l10 7-10 7" fill="none" stroke="#0d6f66" stroke-width="2"/>
    <rect x="778" width="316" height="68" rx="10" fill="#fafaf9" stroke="#c4d0cc"/>
    <text x="796" y="26" fill="#50736d" font-family="ui-monospace, monospace" font-size="12">WHERE IT LIVES</text>
    <text x="796" y="49" fill="#33413d" font-family="ui-monospace, monospace" font-size="15">on your device · with your work</text>
  </g>
  <text x="58" y="346" fill="#6b7975" font-family="ui-monospace, monospace" font-size="13" letter-spacing="1">RUST CORE · LOCAL HISTORY · DESKTOP CLIENT IN DEVELOPMENT</text>
</svg>
